<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyber Galaxy Command Center</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="left-panel">
    <h3>SYSTEM STATUS</h3>
    <p>ONLINE ●</p>

    <div class="logs">
        <p>> Loading modules...</p>
        <p>> Initializing system...</p>
        <p>> Navigation ready...</p>
    </div>
</div>

<div class="right-panel">
    <h3>POWER LEVEL</h3>

    <div class="power-bar">
        <div class="power-fill"></div>
    </div>

    <p>92% CHARGED</p>
</div>

<div class="calculator">

    <div class="header">
        <h1>CYBER GALAXY COMMAND CENTER</h1>
        <span>MISSION CALCULATOR • VERSION 2.0</span>
    </div>

    <div class="divider"></div>

    <div class="terminal-label">
        > DISPLAY
        <span>// READY</span>
    </div>

<div class="display-wrapper">

    <input
        type="text"
        class="display"
        readonly
    >

    <span class="cursor">|</span>

</div>

    <div class="message">
        SYSTEM ONLINE. AWAITING COMMAND...
    </div>

    <div class="buttons">

        <button class="clear">C</button>
        <button class="delete">⌫</button>
        <button class="operator">÷</button>
        <button class="operator">×</button>

        <button>7</button>
        <button>8</button>
        <button>9</button>
        <button class="operator">−</button>

        <button>4</button>
        <button>5</button>
        <button>6</button>
        <button class="operator">+</button>

        <button>1</button>
        <button>2</button>
        <button>3</button>
        <button class="equal">=</button>

        <button class="zero">0</button>
        <button>.</button>

    </div>

    <div class="footer">

        COMMAND • CALCULATE • CONQUER

    </div>
</div>

<script src="script.js"></script>

</body>
</html>
